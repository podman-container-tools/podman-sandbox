# Linux CI scaffold mirroring .cirrus.yml Linux task matrix.
# Test invocation bodies are stubbed (TODO) - to be filled in when the qcow.2
# runner image is ready. Runner labels use the pattern
#   linux-<distro>-<arch>
# which the runner image owner will register.

name: Linux

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/linux.yml'
      - 'cmd/**'
      - 'pkg/**'
      - 'libpod/**'
      - 'test/**'
      - 'contrib/cirrus/**'
      - 'Makefile'
      - 'go.mod'
      - 'go.sum'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ==========================================================================
  # Build family
  # ==========================================================================

  build:
    name: build (${{ matrix.distro }})
    runs-on: linux-${{ matrix.distro }}-amd64
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        distro: [fedora-43, fedora-42, rawhide, debian-14]
    env:
      DISTRO_NV: ${{ matrix.distro }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Run task
        # TODO: invoke contrib/cirrus/runner.sh equivalent
        run: echo "TODO build $DISTRO_NV"
      - if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: build-${{ matrix.distro }}-diag
          path: |
            *.log
            *.html
          if-no-files-found: warn

  build-aarch64:
    name: build (fedora-43-aarch64)
    runs-on: linux-fedora-43-aarch64
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Run task
        run: echo "TODO build aarch64"
      - if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: build-aarch64-diag
          path: |
            *.log
            *.html
          if-no-files-found: warn

  alt-build:
    name: ${{ matrix.alt-name }}
    runs-on: linux-fedora-43-amd64
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        # Windows Cross omitted - already migrated to .github/workflows/windows.yml
        alt-name:
          - Build Each Commit
          - Alt Arch. x86 Cross
          - Alt Arch. ARM Cross
          - Alt Arch. MIPS Cross
          - Alt Arch. MIPS64 Cross
          - Alt Arch. RISCV64 Cross
          - Alt Arch. Other Cross
    env:
      ALT_NAME: ${{ matrix.alt-name }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
