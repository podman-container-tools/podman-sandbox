name: Windows / Tests

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/windows-tests.yml'
      - 'winmake.ps1'
      - 'contrib/cirrus/win-*.ps1'
      - '**/*_test.go'
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Don't cancel post-merge runs on main; they're our ground-truth signal.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  localunit:
    name: localunit
    runs-on: windows-2025-vs2026
    timeout-minutes: 20
    steps:
      - name: Configure git line endings
        shell: pwsh
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Run unit tests
        shell: pwsh
        run: .\winmake.ps1 localunit

  ginkgo:
    name: ginkgo (non-machine e2e)
    runs-on: windows-2025-vs2026
    timeout-minutes: 20
    steps:
      - name: Configure git line endings
        shell: pwsh
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Build podman
        shell: pwsh
        run: |
          .\winmake.ps1 podman-remote
          .\bin\windows\podman.exe --version

      - name: Run non-machine e2e tests
        shell: pwsh
        run: .\winmake.ps1 ginkgo-run
