# Mac build + machine e2e CI on GHA-hosted runners.
# build job mirrors Cirrus osx_alt_build_task: lint + build core binaries + .pkg
# installer + darwin_arm64 release zip. machine job (PoC) mirrors Cirrus
# podman_machine_mac_task: installs the .pkg from build, runs ginkgo e2e against
# the installed podman with CONTAINERS_MACHINE_PROVIDER set to applehv or libkrun.
#
# The machine arms are empirical - prior research suggested Hypervisor.framework
# is not user-accessible on GHA-hosted macOS, but we test anyway. If they fail,
# we have hard evidence the path needs self-hosted Mac hardware (Phase B).

name: Mac

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/mac.yml'
      - 'cmd/**'
      - 'pkg/**'
      - 'libpod/**'
      - 'contrib/pkginstaller/**'
      - 'Makefile'
      - 'go.mod'
      - 'go.sum'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build (darwin arm64)
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Lint
        run: make golangci-lint

      - name: Build core binaries
        run: |
          make .install.ginkgo
          make podman-remote
          make podman-mac-helper

      - name: Build .pkg installer
        # NO_CODESIGN=1 - signing/notarization is a release-time concern handled
        # by .github/workflows/mac-pkg.yml separately.
        run: |
          pushd contrib/pkginstaller
          make ARCH=aarch64 NO_CODESIGN=1 pkginstaller
          popd

      - name: Build release zip
        run: make podman-remote-release-darwin_arm64.zip

      - name: Upload artifacts
        # error (not warn) because the machine job downstream requires these.
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: podman-darwin-arm64
          path: |
            podman-remote-release-darwin_arm64.zip
            contrib/pkginstaller/out/podman-installer-macos-*.pkg
          if-no-files-found: error

  machine:
    name: machine (${{ matrix.provider }})
    needs: build
    runs-on: macos-15
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        provider: [applehv, libkrun]
    env:
      PROVIDER: ${{ matrix.provider }}
      CONTAINERS_MACHINE_PROVIDER: ${{ matrix.provider }}
      # pkg/machine/e2e/machine_test.go:225-253 hard-rejects TMPDIR >= 22 chars
      # on darwin (Unix socket path budget). GHA's default /var/folders/.../T
      # is way over. Use /private/tmp (12 chars), which is in the default
      # config.Machine.Volumes mount list so the machine can access it.
      TMPDIR: /private/tmp
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Diagnostics
        # Empirical: what hardware does macos-15 give us? Apple Silicon should
        # have Hypervisor.framework but user-mode access may be restricted.
        run: |
          sw_vers
          uname -m
          sysctl -n hw.model hw.optional.arm64 || true
          sysctl -n kern.osrelease kern.osversion || true

      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: podman-darwin-arm64
          path: build-artifact

      - name: Install podman from .pkg
        # Mirrors Windows MSI install pattern: install the production artifact,
        # then point ginkgo at the installed binary via PODMAN_BINARY.
        run: |
          PKG=$(find build-artifact -name 'podman-installer-macos-*.pkg' -type f | head -1)
          if [ -z "$PKG" ]; then
              echo "No .pkg found in artifact" >&2
              ls -la build-artifact/ build-artifact/contrib/pkginstaller/out/ 2>/dev/null || true
              exit 1
          fi
          echo "Installing $PKG"
          sudo installer -pkg "$PKG" -target / -verbose
          # The .pkg installs to /opt/podman/ by convention. Locate the binary.
          INSTALLED_BIN=""
          for candidate in /opt/podman/bin/podman /Applications/podman/podman; do
              if [ -x "$candidate" ]; then
                  INSTALLED_BIN="$candidate"
                  break
              fi
          done
          if [ -z "$INSTALLED_BIN" ]; then
              echo "podman binary not found at expected install paths"
              echo "Listing /opt/, /Applications/:"
              ls -la /opt/ /Applications/ 2>/dev/null || true
              find / -name 'podman' -type f -perm -u+x 2>/dev/null | head -10
              exit 1
          fi
          echo "PODMAN_BINARY=$INSTALLED_BIN" >> "$GITHUB_ENV"
          "$INSTALLED_BIN" --version

      - name: Ad-hoc sign vfkit + krunkit for hypervisor entitlement
        # NO_CODESIGN=1 in the .pkg build means vfkit/krunkit are unsigned.
        # Ad-hoc sign with com.apple.security.hypervisor entitlement so HVF
        # acquisition isn't immediately blocked by AMFI (may not be sufficient
        # on its own; the diagnostic shim in the next step captures actual
        # stderr to confirm).
        run: |
          cat > /tmp/hvf.entitlements <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>com.apple.security.hypervisor</key>
              <true/>
          </dict>
          </plist>
          EOF
          for bin in /opt/podman/bin/vfkit /opt/podman/bin/krunkit; do
              if [ -f "$bin" ]; then
                  echo "Signing $bin"
                  sudo codesign --remove-signature "$bin" 2>/dev/null || true
                  sudo codesign --sign - --force --entitlements /tmp/hvf.entitlements "$bin"
                  codesign -dvv "$bin" 2>&1 | head -10
              else
                  echo "WARN: $bin not present (skipping)"
              fi
          done

      - name: Wrap vfkit + krunkit with logging shim
        # podman wraps vfkit/krunkit and only surfaces "exited unexpectedly".
        # The shim renames vfkit -> vfkit.real and installs a bash wrapper at
        # the original path that records argv + stderr to /private/tmp/vfkit-trace/
        # before exec'ing vfkit.real. The trace dir lives outside test temp
        # dirs so logs survive ginkgo's DeferCleanup teardown.
        run: |
          sudo mkdir -p /private/tmp/vfkit-trace
          sudo chmod 1777 /private/tmp/vfkit-trace
          for name in vfkit krunkit; do
              real="/opt/podman/bin/${name}"
              [ -f "$real" ] || continue
              echo "Wrapping $real"
              sudo mv "$real" "${real}.real"
              sudo tee "$real" >/dev/null <<EOF
          #!/bin/bash
          TRACE_DIR=/private/tmp/vfkit-trace
          LOG="\${TRACE_DIR}/${name}-\$\$-\$(date +%s).log"
          {
              echo "=== ${name} \$(date '+%Y-%m-%dT%H:%M:%S') ==="
              echo "args: \$*"
              echo "id: \$(id)"
              echo "--- ${name}.real stderr ---"
          } >> "\$LOG" 2>&1
          exec ${real}.real "\$@" 2>>"\$LOG"
          EOF
              sudo chmod +x "$real"
              # Test the wrapper produces output by calling --help
              "$real" --help 2>&1 | head -5 || true
              ls -la "${real}" "${real}.real"
          done

      - name: Build ginkgo
        run: go build -o ./bin/ginkgo ./vendor/github.com/onsi/ginkgo/v2/ginkgo

      - name: Run machine e2e
        run: |
          ./bin/ginkgo -vv \
            --tags "remote exclude_graphdriver_btrfs containers_image_openpgp" \
            --timeout 50m \
            --trace --no-color \
            --silence-skips \
            pkg/machine/e2e/.

      - name: Collect diagnostic logs (failure only)
        # Three sources, all best-effort (`set +e` so partial collection succeeds):
        #   1. /private/tmp/vfkit-trace/ - argv + stderr captured by the wrapper
        #      shim. THIS is the primary diagnostic - shows vfkit's actual error
        #      message instead of podman's "exited unexpectedly" wrapper.
        #   2. podman machine config dirs (best-effort; usually nuked by
        #      DeferCleanup before this step runs)
        #   3. macOS unified log - AMFI rejections + Hypervisor.framework errors
        if: failure()
        shell: bash
        run: |
          set +e -o nopipefail || set +e
          if [ -d /private/tmp/vfkit-trace ]; then
              ls -la /private/tmp/vfkit-trace/ || true
              # Combine all trace logs into one file for easy reading
              { for f in /private/tmp/vfkit-trace/*.log; do
                    [ -f "$f" ] || continue
                    echo "########## $f ##########"
                    cat "$f"
                done; } > ./vfkit-trace-combined.log 2>/dev/null || true
          fi
          find /private/tmp -path '*/podman/machine/*' -type f \
              \( -name '*.log' -o -name 'vfkit*' -o -name 'krunkit*' \) 2>/dev/null \
            | while IFS= read -r src; do
                dst="./machine-$(echo "$src" | tr '/' '_').log"
                cp "$src" "$dst" 2>/dev/null
              done
          sudo log show \
            --predicate 'process == "vfkit" OR process == "krunkit" OR (subsystem == "com.apple.AMFI") OR senderImagePath CONTAINS "Hypervisor"' \
            --last 30m --style compact > ./macos-system-log.log 2>&1
          echo "--- Collected files ---"
          ls -la ./*.log 2>/dev/null || true
          true

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: machine-${{ matrix.provider }}-diag
          path: |
            *.html
            *.log
          if-no-files-found: warn
