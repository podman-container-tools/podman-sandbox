# Mac CI: build on GHA-hosted macos-15 (ephemeral, fast); machine e2e on a
# self-hosted EC2 mac2.metal runner (bare-metal Hypervisor.framework).

name: Mac

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/mac.yml'
      - 'cmd/**'
      - 'pkg/**'
      - 'libpod/**'
      - 'contrib/pkginstaller/**'
      - 'Makefile'
      - 'go.mod'
      - 'go.sum'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build (darwin arm64)
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Lint
        run: make golangci-lint

      - name: Build core binaries
        run: |
          make .install.ginkgo
          make podman-remote
          make podman-mac-helper

      - name: Build .pkg installer
        run: |
          pushd contrib/pkginstaller
          make ARCH=aarch64 NO_CODESIGN=1 pkginstaller
          popd

      - name: Build release zip
        run: make podman-remote-release-darwin_arm64.zip

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: podman-darwin-arm64
          path: |
            podman-remote-release-darwin_arm64.zip
            contrib/pkginstaller/out/podman-installer-macos-*.pkg
          if-no-files-found: error

  machine:
    name: machine (${{ matrix.provider }})
    needs: build
    runs-on: [self-hosted, macOS, ARM64, podman-machine]
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        provider: [applehv, libkrun]
    env:
      PROVIDER: ${{ matrix.provider }}
      CONTAINERS_MACHINE_PROVIDER: ${{ matrix.provider }}
      # pkg/machine/e2e/machine_test.go rejects TMPDIR >= 22 chars on darwin
      # (Unix socket path budget). /private/tmp is 12 chars.
      TMPDIR: /private/tmp

    steps:
      - name: Pre-clean machine state
        run: |
          if [ -x /opt/podman/bin/podman ]; then
              /opt/podman/bin/podman machine ls --noheading 2>/dev/null \
                | awk '{print $1}' | while read -r m; do
                  [ -n "$m" ] && /opt/podman/bin/podman machine rm -f "$m" || true
              done
          fi
          rm -rf "$HOME/.local/share/containers/podman/machine" 2>/dev/null || true
          rm -rf "$HOME/.config/containers/podman" 2>/dev/null || true
          pkill -f vfkit 2>/dev/null || true
          pkill -f krunkit 2>/dev/null || true
          true

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: podman-darwin-arm64
          path: build-artifact

      - name: Install podman from .pkg
        run: |
          PKG=$(find build-artifact -name 'podman-installer-macos-*.pkg' -type f | head -1)
          [ -n "$PKG" ] || { echo "No .pkg in artifact" >&2; exit 1; }
          sudo installer -pkg "$PKG" -target / -verbose
          INSTALLED_BIN=/opt/podman/bin/podman
          [ -x "$INSTALLED_BIN" ] || { echo "podman not at $INSTALLED_BIN" >&2; exit 1; }
          echo "PODMAN_BINARY=$INSTALLED_BIN" >> "$GITHUB_ENV"
          "$INSTALLED_BIN" --version

      - name: Ad-hoc sign vfkit + krunkit
        # vfkit uses Virtualization.framework, krunkit uses Hypervisor.framework;
        # apply both entitlements to both binaries (unused keys are ignored).
        # cp-to-tmp-then-mv + xattr -cr force AMFI to re-evaluate the binary -
        # its per-path launch cache is not invalidated by `codesign --force` alone.
        run: |
          ENT=$(mktemp "${RUNNER_TEMP:-/tmp}/vm-entitlements.XXXXXX.plist")
          cat > "$ENT" <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>com.apple.security.virtualization</key>
              <true/>
              <key>com.apple.security.hypervisor</key>
              <true/>
          </dict>
          </plist>
          EOF
          for bin in /opt/podman/bin/vfkit /opt/podman/bin/krunkit; do
              [ -f "$bin" ] || continue
              tmp=$(sudo mktemp "${bin}.XXXXXX")
              sudo cp "$bin" "$tmp"
              sudo xattr -cr "$tmp"
              sudo codesign --remove-signature "$tmp" 2>/dev/null || true
              sudo codesign --sign - --force --entitlements "$ENT" "$tmp"
              sudo chmod 0755 "$tmp"
              sudo mv "$tmp" "$bin"
          done

      - name: Build ginkgo
        run: go build -o ./bin/ginkgo ./vendor/github.com/onsi/ginkgo/v2/ginkgo

      - name: Run machine e2e
        run: |
          ./bin/ginkgo -vv \
            --tags "remote exclude_graphdriver_btrfs containers_image_openpgp" \
            --timeout 50m \
            --trace --no-color \
            --silence-skips \
            pkg/machine/e2e/.

      - name: Collect diagnostic logs
        if: failure()
        shell: bash
        run: |
          set +e
          find /private/tmp -path '*/podman/machine/*' -type f \
              \( -name '*.log' -o -name 'vfkit*' -o -name 'krunkit*' \) 2>/dev/null \
            | while IFS= read -r src; do
                cp "$src" "./machine-$(echo "$src" | tr '/' '_').log" 2>/dev/null
              done
          sudo log show \
              --predicate 'process == "vfkit" OR process == "krunkit" OR senderImagePath CONTAINS "Hypervisor" OR senderImagePath CONTAINS "Virtualization"' \
              --last 30m --style compact > ./macos-system-log.log 2>&1
          true

      - name: Post-run cleanup
        if: always()
        run: |
          if [ -x /opt/podman/bin/podman ]; then
              /opt/podman/bin/podman machine ls --noheading 2>/dev/null \
                | awk '{print $1}' | while read -r m; do
                  [ -n "$m" ] && /opt/podman/bin/podman machine rm -f "$m" || true
              done
          fi
          rm -rf "$HOME/.local/share/containers/podman/machine" 2>/dev/null || true
          rm -rf "$HOME/.config/containers/podman" 2>/dev/null || true
          pkill -f vfkit 2>/dev/null || true
          pkill -f krunkit 2>/dev/null || true
          true

      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: machine-${{ matrix.provider }}-diag
          path: |
            *.log
          if-no-files-found: warn
