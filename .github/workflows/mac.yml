# Mac build + machine e2e CI on GHA-hosted runners.
#
# Both jobs run on macos-15 (GHA-hosted). Prior runs on this branch failed
# with "vfkit exited unexpectedly" - we previously attributed that to Anka
# blocking nested Hypervisor.framework, but later diagnostics on a bare-metal
# Mac (ci/mac-dedicated) showed the actual cause was the wrong entitlement key
# (vfkit needs com.apple.security.virtualization, not just .hypervisor).
# This branch retests GHA-hosted with the correct entitlement to find out
# whether nested-virt is actually blocked, or whether we never got past the
# entitlement bug.

name: Mac

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/mac.yml'
      - 'cmd/**'
      - 'pkg/**'
      - 'libpod/**'
      - 'contrib/pkginstaller/**'
      - 'Makefile'
      - 'go.mod'
      - 'go.sum'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build (darwin arm64)
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Lint
        run: make golangci-lint

      - name: Build core binaries
        run: |
          make .install.ginkgo
          make podman-remote
          make podman-mac-helper

      - name: Build .pkg installer
        # NO_CODESIGN=1 - production signing/notarization is handled separately
        # by .github/workflows/mac-pkg.yml. The machine job ad-hoc signs
        # vfkit/krunkit below with the entitlements needed by AMFI.
        run: |
          pushd contrib/pkginstaller
          make ARCH=aarch64 NO_CODESIGN=1 pkginstaller
          popd

      - name: Build release zip
        run: make podman-remote-release-darwin_arm64.zip

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: podman-darwin-arm64
          path: |
            podman-remote-release-darwin_arm64.zip
            contrib/pkginstaller/out/podman-installer-macos-*.pkg
          if-no-files-found: error

  machine:
    name: machine (${{ matrix.provider }})
    needs: build
    runs-on: macos-15
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        provider: [applehv, libkrun]
    env:
      PROVIDER: ${{ matrix.provider }}
      CONTAINERS_MACHINE_PROVIDER: ${{ matrix.provider }}
      # pkg/machine/e2e/machine_test.go rejects TMPDIR >= 22 chars on darwin
      # (Unix socket path budget). /private/tmp is 12 chars and is in the
      # default machine Volumes mount list.
      TMPDIR: /private/tmp

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Diagnostics
        run: |
          sw_vers
          uname -m
          sysctl -n hw.model hw.optional.arm64 hw.optional.arm.FEAT_VHE 2>/dev/null || true
          # Confirm whether the runner exposes a usable Hypervisor.framework
          # versus a nested layer that may block VM creation.
          ioreg -l | grep -iE 'hypervisor|virtualiz' | head -10 || true

      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: podman-darwin-arm64
          path: build-artifact

      - name: Install podman from .pkg
        run: |
          PKG=$(find build-artifact -name 'podman-installer-macos-*.pkg' -type f | head -1)
          if [ -z "$PKG" ]; then
              echo "No .pkg found in artifact" >&2
              ls -la build-artifact/ 2>/dev/null || true
              exit 1
          fi
          echo "Installing $PKG"
          sudo installer -pkg "$PKG" -target / -verbose
          INSTALLED_BIN="/opt/podman/bin/podman"
          [ -x "$INSTALLED_BIN" ] || { echo "podman not at $INSTALLED_BIN" >&2; exit 1; }
          echo "PODMAN_BINARY=$INSTALLED_BIN" >> "$GITHUB_ENV"
          "$INSTALLED_BIN" --version

      - name: Ad-hoc sign vfkit + krunkit with virtualization entitlements
        # NO_CODESIGN=1 left these unsigned. macOS needs different entitlements
        # for its two virt APIs:
        #   - vfkit   uses Apple's Virtualization.framework (Vz)
        #     -> needs com.apple.security.virtualization
        #   - krunkit uses Apple's Hypervisor.framework (HVF)
        #     -> needs com.apple.security.hypervisor
        # Applying both keys to both binaries is harmless (unused entitlements
        # are ignored) and avoids divergent per-binary plists.
        #
        # AMFI caches launch verdicts per-path; `codesign --force` updates the
        # binary on disk but doesn't invalidate the cache. cp-to-tmp-then-mv
        # produces a fresh inode at the same path, which AMFI re-evaluates.
        # `xattr -cr` strips any cached extended-attribute state.
        run: |
          ENT=$(mktemp "${RUNNER_TEMP:-/tmp}/vm-entitlements.XXXXXX.plist")
          cat > "$ENT" <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>com.apple.security.virtualization</key>
              <true/>
              <key>com.apple.security.hypervisor</key>
              <true/>
          </dict>
          </plist>
          EOF
          for bin in /opt/podman/bin/vfkit /opt/podman/bin/krunkit; do
              [ -f "$bin" ] || continue
              tmp=$(sudo mktemp "${bin}.XXXXXX")
              sudo cp "$bin" "$tmp"
              sudo xattr -cr "$tmp"
              sudo codesign --remove-signature "$tmp" 2>/dev/null || true
              sudo codesign --sign - --force --entitlements "$ENT" "$tmp"
              # Match .pkg install convention (0755) so non-root readers (e.g.
              # the verification echo below) can introspect the binary.
              sudo chmod 0755 "$tmp"
              sudo mv "$tmp" "$bin"
              codesign -d --entitlements - "$bin" 2>&1 | head -20
          done

      - name: Build ginkgo
        run: go build -o ./bin/ginkgo ./vendor/github.com/onsi/ginkgo/v2/ginkgo

      - name: Run machine e2e
        run: |
          ./bin/ginkgo -vv \
            --tags "remote exclude_graphdriver_btrfs containers_image_openpgp" \
            --timeout 50m \
            --trace --no-color \
            --silence-skips \
            pkg/machine/e2e/.

      - name: Collect diagnostic logs
        if: failure()
        shell: bash
        run: |
          set +e
          find /private/tmp -path '*/podman/machine/*' -type f \
              \( -name '*.log' -o -name 'vfkit*' -o -name 'krunkit*' \) 2>/dev/null \
            | while IFS= read -r src; do
                dst="./machine-$(echo "$src" | tr '/' '_').log"
                cp "$src" "$dst" 2>/dev/null
              done
          sudo log show \
              --predicate 'process == "vfkit" OR process == "krunkit" OR (subsystem == "com.apple.AMFI") OR senderImagePath CONTAINS "Hypervisor" OR senderImagePath CONTAINS "Virtualization"' \
              --last 30m --style compact > ./macos-system-log.log 2>&1
          ls -la ./*.log 2>/dev/null || true
          true

      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: machine-${{ matrix.provider }}-diag
          path: |
            *.log
          if-no-files-found: warn
